<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thư Mời Dự Tiệc Cưới - Trung & Tâm</title>
  <style>
    :root {
      color-scheme: light;
      --workspace: #f4f4f3;
      --panel: transparent;
      --ink: #172033;
      --muted: #667085;
      --line: #d9dee7;
      --shadow: 0 22px 60px rgba(24, 34, 55, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background-color: var(--workspace);
    }

    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .slide {
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      background-color: var(--panel);
      position: relative;
      overflow: hidden;
    }

    .slide-video-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      pointer-events: none;
      z-index: 0;
    }

    .intro-stage {
      position: absolute;
      inset: 0;
      z-index: 4;
      background: #000;
      opacity: 1;
      transition: opacity 2000ms ease;
    }

    .slide[data-intro-done="true"] .intro-stage {
      opacity: 0;
      pointer-events: none;
    }

    .intro-sequence {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      background: #000; /* Thêm nền đen để tránh màn hình trắng nếu ảnh chưa load kịp */
    }

    .start-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      border: 0;
      background: rgba(244, 244, 243, 0.82);
      color: #41534f;
      cursor: pointer;
      font: inherit;
      letter-spacing: 0;
      transition: opacity 600ms ease;
    }

    .start-overlay span {
      font-size: clamp(18px, 2.4vw, 34px);
      font-weight: 500;
    }

    .slide[data-started="true"] .start-overlay {
      opacity: 0;
      pointer-events: none;
    }

    .card-stage {
      position: absolute;
      inset: 50% auto auto 50%;
      width: min(72%, 980px);
      aspect-ratio: 1387 / 963;
      max-height: 78%;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.96);
      transform-origin: center;
      z-index: 10; /* Tăng z-index để nổi lên trên các lớp trang trí */
      transition: opacity 900ms ease;
      will-change: opacity, transform;
      pointer-events: none; /* Mặc định không cho click để không chặn lớp bắt đầu */
    }

    .slide[data-intro-done="true"] .card-stage {
      animation: centerArtReveal 2.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      pointer-events: auto; /* Chỉ cho phép click khi intro đã chạy xong */
    }

    .card-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transition: opacity 260ms ease, transform 260ms ease;
      will-change: opacity, transform;
    }

    .open-stage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 1;
      transform-origin: center;
    }

    .slide[data-sequence-ready="true"] .open-stage {
      opacity: 1;
    }

    .open-sequence {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .slide[data-open-complete="true"] .open-stage {
      animation: openCardBreath 4.8s ease-in-out infinite;
    }

    .slide[data-card-open="true"] .card-stage {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: none;
      animation: none;
    }

    .seal-wrap {
      position: absolute;
      left: 50%;
      top: 67%; /* Đưa về đúng vị trí con dấu trên ảnh centered-slide.png */
      width: clamp(60px, 8vw, 110px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    .seal-button {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      border: 0;
      cursor: pointer;
    }

    .arrow-gif {
      position: absolute;
      width: clamp(200px, 45vw, 200px); /* Chỉnh lại vw để tỉ lệ với nút */
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 500ms ease;
      /* Vị trí cố định so với seal-wrap */
      left: 50%;
      top: 50%;
      transform: translate(-105%, -40%); /* Căn chỉnh lại vì nút đã đổi top */
    }

    .slide[data-intro-done="true"] .arrow-gif {
      animation: arrowReveal 0.5s ease 2s forwards;
    }

    @keyframes arrowReveal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .seal-button:hover,
    .seal-button:focus,
    .seal-button:focus-visible,
    .seal-button:active {
      background: transparent;
      box-shadow: none;
      outline: none;
    }

    .slide[data-card-open="true"] .seal-button {
      display: none;
    }

    .grass-front {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      pointer-events: none;
      z-index: 11; /* Đưa lên trên card-stage (10) để tạo độ sâu */
      transition: opacity 1600ms ease;
    }

    .slide[data-grass-hidden="true"] .grass-front {
      opacity: 0;
    }

    @keyframes centerArtReveal {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.96);
      }

      55% {
        opacity: 1;
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.03);
      }
    }

    @keyframes openCardBreath {
      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.018);
      }
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background-image:
        linear-gradient(rgba(23, 32, 51, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 32, 51, 0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    /* Xoay ngang màn hình cho điện thoại khi ở chế độ dọc (portrait) */
    @media screen and (orientation: portrait) and (max-width: 1024px) {
      .stage {
        width: 100vh;
        height: 100vw;
        transform: rotate(90deg);
        transform-origin: center center;
        position: fixed;
        top: 50%;
        left: 50%;
        margin-left: -50vh;
        margin-top: -50vw;
      }
      .slide {
        width: 100vh;
        height: 100vw;
        max-width: none;
      }
    }

    /* Đảm bảo tỉ lệ trên máy tính và màn hình ngang */
    @media screen and (orientation: landscape) and (max-width: 720px) {
      .slide {
        width: min(100vw, calc(100vh * 16 / 9));
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <section class="slide" id="slide" data-card-open="false" data-sequence-ready="false" data-intro-done="false" data-started="false" data-open-complete="false" data-grass-hidden="false" aria-label="Slide tỉ lệ 16:9">
      <img class="slide-video-bg" id="slideVideoA" src="slide-background.gif" alt="" aria-hidden="true">
      <button class="start-overlay" id="startOverlay" type="button" aria-label="Bắt đầu">
        <span>Chạm nhẹ để câu chuyện bắt đầu</span>
      </button>
      <div class="intro-stage" id="introStage" aria-hidden="true">
        <img class="intro-sequence" id="introSequence" src="intro-sequence/intro_00000.webp?v=intro-1" alt="">
      </div>
      <div class="open-stage" aria-hidden="true">
        <img class="open-sequence" id="openSequence" src="open-sequence/hf_20260525_081836_766657e7-cc54-4da7-95cd-544b41b68d74_00000.webp?v=open-sequence-3" alt="">
      </div>
      <div class="card-stage" aria-live="polite">
        <img class="card-art card-closed" src="centered-slide.png" alt="Thiệp cưới màu xanh đang đóng">
        <div class="seal-wrap">
          <button class="seal-button" id="sealButton" type="button" aria-label="Mở thiệp"></button>
          <img class="arrow-gif" src="arrow.gif" alt="">
        </div>
      </div>
      <img class="grass-front" id="grassFront" src="grass-sequence-current/slide-background_00000.webp?v=grass-replaced-3" alt="">
    </section>
  </main>
  <audio id="weddingMusic" src="wedding-music.mp3" preload="auto"></audio>

  <script>
    const stage = document.getElementById("stage");
    const slide = document.getElementById("slide");
    const slideVideoA = document.getElementById("slideVideoA");
    const startOverlay = document.getElementById("startOverlay");
    const introStage = document.getElementById("introStage");
    const introSequence = document.getElementById("introSequence");
    const grassFront = document.getElementById("grassFront");
    const openSequence = document.getElementById("openSequence");
    const sealButton = document.getElementById("sealButton");
    const arrowGif = document.querySelector(".arrow-gif");
    const weddingMusic = document.getElementById("weddingMusic");
    const grassFrameCount = 50;
    const grassFrameDuration = 70;
    const grassFrames = Array.from({ length: grassFrameCount }, (_, index) => {
      return `grass-sequence-current/slide-background_${String(index).padStart(5, "0")}.webp?v=grass-replaced-3`;
    });
    const introFrameCount = 193;
    const introFrameDuration = 42;
    const introFrames = Array.from({ length: introFrameCount }, (_, index) => {
      return `intro-sequence/intro_${String(index).padStart(5, "0")}.webp?v=intro-1`;
    });
    const openFrameCount = 294;
    const openFrameDuration = 42;
    const openFrames = Array.from({ length: openFrameCount }, (_, index) => {
      return `open-sequence/hf_20260525_081836_766657e7-cc54-4da7-95cd-544b41b68d74_${String(index).padStart(5, "0")}.webp?v=open-sequence-3`;
    });
    let openFrameImages = [];
    let introFrameImages = [];
    let openFramesReady = false;
    let sequenceRevealTimerDone = false;
    let openSequenceStarted = false;
    let musicStarted = false;
    let introStarted = false;

    function startMusic() {
      if (musicStarted) {
        return;
      }

      weddingMusic.play().then(() => {
        musicStarted = true;
      }).catch(() => {});
    }

    function preloadGrassFrames() {
      grassFrames.forEach((src) => {
        const image = new Image();
        image.src = src;
      });
    }

    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = src;
        img.onload = () => resolve(img);
        img.onerror = () => {
          console.warn(`Failed to load image: ${src}`);
          resolve(null); // Resolve with null instead of rejecting
        };
      });
    }

    async function preloadOpenFrames() {
      openFrameImages = await Promise.all(openFrames.map(loadImage));
      openFramesReady = true;
      revealOpenSequenceLayer();
    }

    async function preloadIntroFrames() {
      introFrameImages = await Promise.all(introFrames.map(loadImage));
    }

    function startExperience() {
      if (introStarted) {
        return;
      }

      introStarted = true;
      slide.dataset.started = "true";
      startMusic();
      playIntroSequence();
      setTimeout(() => {
        startOverlay.hidden = true;
      }, 650);
    }

    function revealOpenSequenceLayer() {
      if (openFramesReady && sequenceRevealTimerDone) {
        slide.dataset.sequenceReady = "true";
      }
    }

    function playGrassSequence() {
      let frame = 0;
      setInterval(() => {
        frame = (frame + 1) % grassFrames.length;
        grassFront.src = grassFrames[frame];
      }, grassFrameDuration);
    }



    function playIntroSequence() {
      let frame = 0;
      let lastFrameTime = performance.now();
      
      // Safety check: if introFrameImages is not fully loaded, use the raw paths
      const getFrameSrc = (idx) => {
        if (introFrameImages[idx] && introFrameImages[idx].src) {
          return introFrameImages[idx].src;
        }
        return introFrames[idx];
      };

      introSequence.src = getFrameSrc(frame);

      function advanceFrame(now) {
        if (now - lastFrameTime < introFrameDuration) {
          requestAnimationFrame(advanceFrame);
          return;
        }

        lastFrameTime = now;
        frame += 1;
        if (frame >= introFrameCount) {
          slide.dataset.introDone = "true";
          setTimeout(() => {
            introStage.hidden = true;
          }, 2050);
          return;
        }

        introSequence.src = getFrameSrc(frame);
        requestAnimationFrame(advanceFrame);
      }

      requestAnimationFrame(advanceFrame);
    }

    function playOpenSequence() {
      if (openSequenceStarted) {
        return;
      }

      openSequenceStarted = true;
      let frame = 0;
      let lastFrameTime = performance.now();
      
      const getFrameSrc = (idx) => {
        if (openFrameImages[idx] && openFrameImages[idx].src) {
          return openFrameImages[idx].src;
        }
        return openFrames[idx];
      };

      openSequence.src = getFrameSrc(frame);

      function advanceFrame(now) {
        if (now - lastFrameTime < openFrameDuration) {
          requestAnimationFrame(advanceFrame);
          return;
        }

        lastFrameTime = now;
        frame += 1;
        if (frame >= openFrameCount) {
          slide.dataset.openComplete = "true";
          return;
        }

        openSequence.src = getFrameSrc(frame);
        requestAnimationFrame(advanceFrame);
      }

      requestAnimationFrame(advanceFrame);
    }

    sealButton.addEventListener("click", () => {
      slide.dataset.cardOpen = "true";
      if (arrowGif) arrowGif.style.display = "none";
      setTimeout(() => {
        slide.dataset.grassHidden = "true";
      }, 3000);
      startMusic();
      playOpenSequence();
    });

    startOverlay.addEventListener("click", startExperience);
    window.addEventListener("keydown", startExperience, { once: true });

    preloadGrassFrames();
    preloadIntroFrames();
    preloadOpenFrames();

    setTimeout(() => {
      sequenceRevealTimerDone = true;
      revealOpenSequenceLayer();
    }, 1500);
    playGrassSequence();
  </script>
</body>
</html>
